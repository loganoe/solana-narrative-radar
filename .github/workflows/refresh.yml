name: Refresh narrative snapshot

on:
  schedule:
    - cron: "12 9 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run refresh
      - run: npm run check
      - name: Commit refreshed snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh narrative snapshot"
          file_pattern: data/snapshot.json
